<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="50%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    
    <!-- Neon Accent Gradients -->
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <linearGradient id="neon-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <linearGradient id="neon-rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    
    <!-- Metallic Gradient -->
    <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>

    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <!-- Filters for Glow effects -->
    <filter id="neon-glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="4" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Squircle Base (Premium Dark Glassmorphism) -->
  <rect x="24" y="24" width="464" height="464" rx="110" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="6" filter="url(#soft-shadow)" />

  <!-- Outer Film Strip Frame (Subtle Background Detail) -->
  <g opacity="0.12" stroke="#ffffff" stroke-width="4" fill="none">
    <rect x="70" y="70" width="372" height="372" rx="30" />
    <!-- Film sprocket holes -->
    <rect x="85" y="85" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="135" y="85" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="185" y="85" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="235" y="85" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="285" y="85" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="335" y="85" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="385" y="85" width="20" height="15" rx="3" fill="#ffffff" />
    <!-- Bottom holes -->
    <rect x="85" y="412" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="135" y="412" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="185" y="412" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="235" y="412" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="285" y="412" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="335" y="412" width="20" height="15" rx="3" fill="#ffffff" />
    <rect x="385" y="412" width="20" height="15" rx="3" fill="#ffffff" />
  </g>

  <!-- Glowing Cinematic Circle Reel Backing -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#border-grad)" stroke-width="2" opacity="0.3" filter="url(#neon-glow-filter)" />

  <!-- The Clapperboard/Cine Symbol (representing Cinema/Organizer) -->
  <g transform="translate(146, 120)" filter="url(#soft-shadow)">
    <!-- Main Clapper Body -->
    <path d="M 10 70 L 210 70 L 210 240 C 210 250, 200 260, 190 260 L 30 260 C 20 260, 10 250, 10 240 Z" fill="#1e293b" stroke="url(#metal-grad)" stroke-width="4" />
    
    <!-- Clapper Top Bar (Angled Opened Clapper) -->
    <g transform="rotate(-15, 10, 70)">
      <path d="M 10 30 L 210 30 L 210 65 L 10 65 Z" fill="#0f172a" stroke="url(#metal-grad)" stroke-width="4" />
      <!-- White Stripes on Top Bar -->
      <path d="M 35 30 L 55 30 L 35 65 L 15 65 Z" fill="#f8fafc" />
      <path d="M 85 30 L 105 30 L 85 65 L 65 65 Z" fill="#f8fafc" />
      <path d="M 135 30 L 155 30 L 135 65 L 115 65 Z" fill="#f8fafc" />
      <path d="M 185 30 L 205 30 L 185 65 L 165 65 Z" fill="#f8fafc" />
    </g>

    <!-- Clapper Base Stripes (Closed reference) -->
    <path d="M 10 70 L 210 70 L 210 95 L 10 95 Z" fill="#0f172a" stroke="url(#metal-grad)" stroke-width="2" />
    <path d="M 45 70 L 65 70 L 45 95 L 25 95 Z" fill="#f8fafc" opacity="0.8" />
    <path d="M 95 70 L 115 70 L 95 95 L 75 95 Z" fill="#f8fafc" opacity="0.8" />
    <path d="M 145 70 L 165 70 L 145 95 L 125 95 Z" fill="#f8fafc" opacity="0.8" />
    <path d="M 195 70 L 210 70 L 210 95 L 195 95 Z" fill="#f8fafc" opacity="0.8" />

    <!-- Clapperboard Board Text Lines (Representing Organized Data/List) -->
    <rect x="35" y="125" width="100" height="8" rx="4" fill="url(#neon-cyan)" opacity="0.75" />
    <rect x="35" y="145" width="150" height="8" rx="4" fill="url(#metal-grad)" opacity="0.5" />
    <rect x="35" y="165" width="120" height="8" rx="4" fill="url(#metal-grad)" opacity="0.5" />
    <rect x="35" y="185" width="70" height="8" rx="4" fill="url(#neon-violet)" opacity="0.75" />
    
    <!-- Camera Lens / Film Reel Detail on Clapperboard -->
    <circle cx="160" cy="180" r="24" fill="#0f172a" stroke="url(#neon-violet)" stroke-width="3" />
    <circle cx="160" cy="180" r="12" fill="#1e1b4b" stroke="url(#neon-cyan)" stroke-width="2" />
    <circle cx="155" cy="175" r="4" fill="#ffffff" opacity="0.6" />
  </g>

  <!-- Big Glowing AI Sparkle / Magic Wand Star (representing 'AI' Intelligence) -->
  <g transform="translate(330, 240)" filter="url(#neon-glow-filter)">
    <!-- Glowing Core Star -->
    <path d="M 40 0 L 52 28 L 80 40 L 52 52 L 40 80 L 28 52 L 0 40 L 28 28 Z" fill="url(#border-grad)" />
    <!-- Secondary tiny star -->
    <path d="M 15 -20 L 19 -9 L 30 -5 L 19 -1 L 15 10 L 11 -1 L 0 -5 L 11 -9 Z" fill="#ffffff" opacity="0.9" />
  </g>

  <!-- Small AI Sparkle Star -->
  <g transform="translate(100, 280)" filter="url(#neon-glow-filter)">
    <path d="M 20 0 L 26 14 L 40 20 L 26 26 L 20 40 L 14 26 L 0 20 L 14 14 Z" fill="url(#neon-cyan)" />
  </g>

  <!-- Modern Abstract "C" and "A" Interlocking Glow Line -->
  <path d="M 220 380 C 180 380, 160 350, 160 310 C 160 270, 190 250, 220 250" fill="none" stroke="url(#neon-cyan)" stroke-width="8" stroke-linecap="round" opacity="0.4" filter="url(#neon-glow-filter)" />
</svg>
