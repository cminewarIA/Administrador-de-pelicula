name: Build and Publish Debian Package

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Determine Version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/[vV]([0-9]+\.[0-9]+\.[0-9]+.*) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            TAG_NAME="${{ github.ref_name }}"
            IS_RELEASE="true"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/([0-9]+\.[0-9]+\.[0-9]+.*) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            TAG_NAME="${{ github.ref_name }}"
            IS_RELEASE="true"
          else
            # Fallback for push to main or PR
            VERSION="1.0.0-build${{ github.run_number }}"
            TAG_NAME="latest"
            IS_RELEASE="false"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Dependencies
        run: npm ci

      - name: Make Build Script Executable
        run: chmod +x ./build_deb.sh

      - name: Build Debian Package
        run: ./build_deb.sh "${{ steps.get_version.outputs.version }}"

      - name: Upload Debian Artifact
        uses: actions/upload-artifact@v4
        with:
          name: movie-organizer-deb-${{ steps.get_version.outputs.version }}
          path: ./movie-organizer_${{ steps.get_version.outputs.version }}_all.deb
          if-no-files-found: error

      - name: Create and Push Git Tag (Latest)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest
        shell: bash

      - name: Create and Publish GitHub Release
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          files: ./movie-organizer_${{ steps.get_version.outputs.version }}_all.deb
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: ${{ steps.get_version.outputs.is_release == 'true' && format('Release {0}', github.ref_name) || 'Latest Development Build' }}
          draft: false
          prerelease: ${{ steps.get_version.outputs.is_release != 'true' }}
          make_latest: ${{ steps.get_version.outputs.is_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
